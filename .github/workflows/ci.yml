name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Build C# publish artifacts
        run: |
          cd csharp
          bash publish.sh

      - name: Validate Python script syntax
        run: |
          python -m pip install --user requests
          python -m py_compile python/dyfi_updater.py

      - name: Validate shell script syntax
        run: bash -n shell/dyfi_updater.sh

      - name: Validate PowerShell script syntax
        shell: pwsh
        run: |
          $content = Get-Content powershell/dyfi_updater.ps1 -Raw
          [ScriptBlock]::Create($content) | Out-Null

      - name: Build Docker image
        run: docker build -t dyfi-updater -f docker/Dockerfile docker
